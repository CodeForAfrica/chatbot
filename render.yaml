# One-click deploy to Render (https://render.com).
# Fork/connect the repo, then "New → Blueprint" and point at this file.
services:
  - type: web
    name: sensors-africa-chatbot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SENSORS_API_BASE
        value: https://api.sensors.africa
      # Secret — Render prompts for this at deploy; never stored in the repo.
      - key: SENSORS_API_KEY
        sync: false
      - key: SENSORS_API_KEY_SCHEME
        value: Token
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
